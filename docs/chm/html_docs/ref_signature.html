    <h1>Signature</h1>
<div class="topic-meta">Topic: <code>signature</code></div>
<h2>Explanation</h2>
<p><code>@@signature=id</code> inserts a formatted signature block inside the <code>@meeting</code> block.</p>
<p>The referenced entry must exist in the <code>@signatures</code> block.</p>
<h2>Examples</h2>
<pre><code>@@signature=lead</code></pre>
