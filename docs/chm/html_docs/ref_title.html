<h2>Explanation</h2>
<p><code>@title &quot;...&quot;</code> is used for shared tag files and tag statistics output.</p>
<p>It allows a custom report title instead of falling back to the file name.</p>
<h2>Examples</h2>
<pre><code>@title &quot;Shared Project Tags&quot;</code></pre>
