    <h1>Protoml ListHelp</h1>
<div class="topic-meta">Topic: <code>protoml-listHelp</code></div>
<h2>Explanation</h2>
<p>Lists all available documentation modules from the <code>/docs</code> folder.</p>
<p>Each <code>.pml</code> doc file must start with <code>@help</code> and include at least a <code>=name:</code> and <code>=docs:</code> field.</p>
<h2>Examples</h2>
<pre><code>protoparser --listDocs</code></pre>
