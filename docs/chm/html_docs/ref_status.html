    <h1>Status</h1>
<div class="topic-meta">Topic: <code>status</code></div>
<h2>Explanation</h2>
<p><code>@status:...</code> defines the document lifecycle status.</p>
<p>Common values are <code>draft</code>, <code>review</code>, <code>approved</code>, <code>active</code>, or <code>archived</code>. The value is stored in the document metadata and can be referenced via <code>@@ref=meta:status</code>.</p>
<h2>Examples</h2>
<pre><code>@status:review</code></pre>
