    <h1>Approval</h1>
<div class="topic-meta">Topic: <code>approval</code></div>
<h2>Explanation</h2>
<p><code>@@approval=id</code> inserts a formatted approval block inside the <code>@meeting</code> block.</p>
<p>The referenced entry must exist in the <code>@approvals</code> block.</p>
<h2>Examples</h2>
<pre><code>@@approval=security</code></pre>
